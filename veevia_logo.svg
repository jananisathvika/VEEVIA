</g>

<!-- Brand name -->
<text x="180" y="310" text-anchor="middle" font-family="Georgia, serif" font-size="32" font-weight="400" fill="#3D2B1F" letter-spacing="3" style="fill:rgb(61, 43, 31);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Georgia, serif;font-size:32px;font-weight:400;text-anchor:middle;dominant-baseline:auto">Vee<tspan fill="#C4704F" style="fill:rgb(196, 112, 79);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Georgia, serif;font-size:32px;font-weight:400;text-anchor:middle;dominant-baseline:auto">via</tspan></text>
<text x="180" y="335" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#8B6F47" letter-spacing="5" style="fill:rgb(139, 111, 71);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Georgia, serif;font-size:11px;font-weight:400;text-anchor:middle;dominant-baseline:auto">INTERIOR DESIGN AI</text>

